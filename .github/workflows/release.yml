name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0, v0.1.0, etc.

jobs:
  release:
    name: Publish Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update Maven version
        run: |
          mvn versions:set -DnewVersion=${{ steps.version.outputs.VERSION }}
          mvn versions:commit

      - name: Verify version
        run: |
          pom_version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          if [ "$pom_version" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "Version mismatch: pom=$pom_version tag=${{ steps.version.outputs.VERSION }}"
            exit 1
          fi

      - name: Run tests
        run: mvn test

      - name: Publish to Maven Central
        run: mvn -B clean deploy
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            ## Franckie Validation Framework ${{ steps.version.outputs.VERSION }}

            ### Installation

            Maven:
            ```xml
            <dependency>
                <groupId>solutions.jara</groupId>
                <artifactId>validation-core</artifactId>
                <version>${{ steps.version.outputs.VERSION }}</version>
            </dependency>
            ```

            ### What's Changed
            - See [CHANGELOG.md](CHANGELOG.md) for details

            ### Documentation
            - [Custom Predicates Guide](documentation/CUSTOM_PREDICATES_PROPOSAL.md)
            - [Rule Serializability](documentation/RULE_SERIALIZABILITY.md)
            - [Validation Context Pattern](documentation/VALIDATION_CONTEXT_PATTERN.md)
          files: |
            validation-core/target/validation-core-*.jar
            validation-processor/target/validation-processor-*.jar
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
